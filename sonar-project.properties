# SonarQube Project Configuration
sonar.projectKey=rentify
sonar.projectName=Rentify API
sonar.projectVersion=1.0.0

# Source code
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts

# Language
sonar.language=ts

# TypeScript
sonar.typescript.node=node

# Coverage
sonar.coverage.exclusions=**/*.test.ts,**/tests/**,src/shared/lib/db-schemas.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.d.ts

# Source encoding
sonar.sourceEncoding=UTF-8